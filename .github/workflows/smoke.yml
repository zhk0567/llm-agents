name: smoke

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python deps
        run: |
          cd python
          python -m venv .venv
          .venv/bin/pip install -e ".[all]"
      - name: Run smoke (fallback allowed)
        run: |
          cd python
          for fw in langgraph pydantic_ai llamaindex; do
            echo "=== $fw ==="
            .venv/bin/python $fw/main.py "CI smoke" || true
          done

  typescript-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install and run
        run: |
          cd typescript
          npm install
          cd langgraph-js
          npm run start -- "CI smoke" || true
